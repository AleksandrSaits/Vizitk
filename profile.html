<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO Video — Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="logo" onclick="location.href='index.html'">ZERO<span>Video</span></div>
        <input type="text" id="searchBar" placeholder="Поиск видео...">
        <nav id="nav-auth"></nav>
    </header>

    <main class="container">
        <div class="profile-header">
            <h2>Мой профиль</h2>
            <p id="userEmail"></p>
            <button id="logoutBtnFull" class="btn-secondary">Выйти из аккаунта</button>
        </div>
        <hr>
        <h3>Мои видео</h3>
        <div class="video-grid" id="myVideosGrid"></div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
